<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#6366f1"/>
  <title>KChat B2B — Mobile Demo</title>
  <meta name="description" content="Static HTML/CSS/JS mobile click-through demo of the KChat B2B messaging-first experience."/>

  <!-- Reuse desktop card chrome + design tokens; mobile stylesheets layer on top. -->
  <link rel="stylesheet" href="../desktop/css/variables.css"/>
  <link rel="stylesheet" href="../desktop/css/cards.css"/>
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <link rel="stylesheet" href="css/layout.css"/>
  <link rel="stylesheet" href="css/tabs.css"/>
  <link rel="stylesheet" href="css/chat.css"/>
  <link rel="stylesheet" href="css/thread.css"/>
  <link rel="stylesheet" href="css/ai.css"/>
  <link rel="stylesheet" href="css/kapps.css"/>
  <link rel="stylesheet" href="css/inbox.css"/>
  <link rel="stylesheet" href="css/activity.css"/>
  <link rel="stylesheet" href="css/profile.css"/>
  <link rel="stylesheet" href="css/transitions.css"/>
</head>
<body>

<div class="phone" id="phone">
  <!-- Cosmetic top safe-area / status bar -->
  <div class="status-bar" aria-hidden="true">
    <span class="sb-time">9:41</span>
    <span class="sb-right">●●●●● · 5G · 100%</span>
  </div>

  <!-- Top app bar — title and back button rendered per screen -->
  <header class="topbar" id="topbar" role="banner"></header>

  <!-- Stacked screens. Each tab stack pushes screens here; only one is visible. -->
  <main class="content" id="content" role="main">

    <!-- Chat tab root: channel list -->
    <section class="screen" data-screen="channel-list" data-tab="chat" data-root="true"></section>
    <!-- Channel chat (pushed) -->
    <section class="screen" data-screen="channel-chat" data-tab="chat"></section>
    <!-- Thread detail (pushed) -->
    <section class="screen" data-screen="thread-detail" data-tab="chat"></section>

    <!-- AI tab root: action launcher full-screen -->
    <section class="screen" data-screen="ai-launcher" data-tab="ai" data-root="true"></section>
    <!-- Brief builder (pushed) -->
    <section class="screen" data-screen="ai-brief" data-tab="ai"></section>
    <!-- Processing (pushed) -->
    <section class="screen" data-screen="ai-processing" data-tab="ai"></section>
    <!-- Output review (pushed) -->
    <section class="screen" data-screen="ai-output" data-tab="ai"></section>

    <!-- Inbox tab root -->
    <section class="screen" data-screen="inbox" data-tab="inbox" data-root="true"></section>

    <!-- Activity tab root -->
    <section class="screen" data-screen="activity" data-tab="activity" data-root="true"></section>

    <!-- Me tab root -->
    <section class="screen" data-screen="me" data-tab="me" data-root="true"></section>

    <!-- KApps (pushed; reachable from any tab) -->
    <section class="screen" data-screen="tasks" data-tab="*"></section>
    <section class="screen" data-screen="task-detail" data-tab="*"></section>
    <section class="screen" data-screen="approval-review" data-tab="*"></section>
    <section class="screen" data-screen="ai-employee" data-tab="*"></section>

  </main>

  <!-- Bottom tab bar -->
  <nav class="tabbar" id="tabbar" role="tablist" aria-label="Primary"></nav>

  <!-- Bottom sheet container (overlay) -->
  <div class="sheet-root" id="sheet-root" aria-hidden="true">
    <div class="sheet-backdrop" data-sheet-action="close"></div>
    <div class="sheet" role="dialog" aria-modal="true">
      <div class="sheet-grabber" data-sheet-action="close"></div>
      <div class="sheet-body" id="sheet-body"></div>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
